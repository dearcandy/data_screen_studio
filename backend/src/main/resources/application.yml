server:
  port: 8088

spring:
  application:
    name: data-screen-studio
  servlet:
    multipart:
      max-file-size: 32MB
      max-request-size: 40MB
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3308}/${MYSQL_DB:data_screen_studio}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

# Studio: file uploads (Excel) under project dir
studio:
  upload-dir: ./data/uploads

logging:
  level:
    com.example.datascreen: INFO
